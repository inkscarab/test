<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>калейдоскоп</title>
   <style>
    body { 
        margin: 0; 
        height: 100vh;
        display: flex; 
        align-items: center; 
        justify-content: center; 
        background: #050505;
    }

    /* Общий контейнер */
    .wrapper {
        position: relative;
        width: 75vmin; 
        height: 75vmin;
    }

    /* Слой с калейдоскопом (снизу) */
    #kaleidoscope-container {
        position: absolute;
        inset: 0;
        clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
        overflow: hidden;
    }

    /* Слой с рамкой (сверху) */
    .gold-frame {
        position: absolute;
        inset: 0;
        pointer-events: none; /* Пропускает клики сквозь себя к калейдоскопу */
        /* Рисуем только контур восьмигранника */
        background: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        
        /* Магия маски: рисует фон только там, где рамка */
        -webkit-mask: 
            linear-gradient(#fff 0 0) content-box, 
            linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        
        padding: 6px; /* ТОЛЩИНА РАМКИ */
        clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
    }

    canvas { display: block; width: 100%; height: 100%; }
</style>

<body>
    <div class="wrapper">
        <div id="kaleidoscope-container">
            <canvas id="canvas"></canvas>
        </div>
        <div class="gold-frame"></div> <!-- Рамка теперь здесь, над калейдоскопом -->
    </div>

<script>

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const img1 = new Image();
const img2 = new Image();
img1.src = 'photo1.jpg'; 
img2.src = 'photo2.jpg';

let loaded = 0;
[img1, img2].forEach(img => img.onload = () => {
    loaded++;
    if(loaded === 2) { resize(); draw(); }
});

let size, radius;
const slices = 12; 
let time = 0;
const zoom = 1.8; // Чем больше число, тем меньше шансов увидеть пустоту

// Координаты
let mouseX = 0, mouseY = 0;
let targetX = 0, targetY = 0;
let isMoving = false;

function resize() {
    size = canvas.width = canvas.height = canvas.offsetWidth;
    radius = size / 0.7;
    targetX = mouseX = size / 2;
    targetY = mouseY = size / 2;
}

window.addEventListener('resize', resize);

const updateMouse = (x, y) => {
    const rect = canvas.getBoundingClientRect();
    targetX = x - rect.left;
    targetY = y - rect.top;
    isMoving = true;
    clearTimeout(window.mouseTimeout);
    window.mouseTimeout = setTimeout(() => isMoving = false, 3000);
};

window.addEventListener('mousemove', e => updateMouse(e.clientX, e.clientY));
window.addEventListener('touchmove', e => {
    updateMouse(e.touches[0].clientX, e.touches[0].clientY);
});

function draw() {
    time += 0.003; 

    mouseX += (targetX - mouseX) * 0.05;
    mouseY += (targetY - mouseY) * 0.05;

    const autoX = size/2 + Math.sin(time) * (size/4);
    const autoY = size/2 + Math.cos(time * 0.8) * (size/4);

    const finalX = isMoving ? mouseX : autoX;
    const finalY = isMoving ? mouseY : autoY;

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, size, size);
    
    const step = (Math.PI * 2) / slices;
    const cx = size / 2;
    const cy = size / 2;

    for (let i = 0; i < slices; i++) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(i * step);

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(radius, -step * radius / 2);
        ctx.lineTo(radius, step * radius / 2);
        ctx.closePath();
        ctx.clip();

        const currentImg = (i % 2 === 0) ? img1 : img2;
        if (i % 2 === 1) ctx.scale(1, -1);

        // --- УМНОЕ ЗАПОЛНЕНИЕ (без пустот) ---
        const maxShiftX = (currentImg.width - (currentImg.width / zoom)) / 2;
        const maxShiftY = (currentImg.height - (currentImg.height / zoom)) / 2;

        const offsetX = ((finalX / size) - 0.5) * currentImg.width;
        const offsetY = ((finalY / size) - 0.5) * currentImg.height;
        
        const clampedX = Math.max(-maxShiftX, Math.min(maxShiftX, offsetX));
        const clampedY = Math.max(-maxShiftY, Math.min(maxShiftY, offsetY));

        ctx.drawImage(
            currentImg,
            (currentImg.width / 2 - currentImg.width / (zoom * 2)) + clampedX,
            (currentImg.height / 2 - currentImg.height / (zoom * 2)) + clampedY,
            currentImg.width / zoom, currentImg.height / zoom,
            0, -radius, radius * 2, radius * 2
        );

        ctx.restore();
    }
    requestAnimationFrame(draw);
}

</script>
</body>
</html>
