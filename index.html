<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Твой Калейдоскоп</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        .hint {
            position: absolute; bottom: 20px; width: 100%;
            text-align: center; color: rgba(255,255,255,0.5);
            font-family: sans-serif; pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="hint">Двигай мышкой и кликай, чтобы сменить цвет</div>
    <canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let width, height, cx, cy;
let hue = Math.random() * 360;
let mouseX = 0, mouseY = 0;

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    cx = width / 2;
    cy = height / 2;
}

window.addEventListener('resize', resize);
resize();

// Слушатели событий
window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
window.addEventListener('touchmove', e => { 
    mouseX = e.touches[0].clientX; 
    mouseY = e.touches[0].clientY; 
});
window.addEventListener('mousedown', () => hue = Math.random() * 360);

function draw() {
    // Полупрозрачный фон для эффекта шлейфа
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(0, 0, width, height);

    const segments = 12; // Количество граней
    const angle = (Math.PI * 2) / segments;

    ctx.save();
    ctx.translate(cx, cy);

    for (let i = 0; i < segments; i++) {
        ctx.rotate(angle);
        
        // Рисуем "лепесток" калейдоскопа
        ctx.beginPath();
        ctx.moveTo(0, 0);
        let x = (mouseX - cx) * 0.5;
        let y = (mouseY - cy) * 0.5;
        ctx.lineTo(x, y);
        ctx.lineWidth = 2;
        ctx.strokeStyle = `hsla(${hue}, 80%, 60%, 0.8)`;
        ctx.stroke();

        // Добавляем блики
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${(hue + 40) % 360}, 100%, 70%, 1)`;
        ctx.fill();
    }
    ctx.restore();

    hue += 0.5; // Плавная смена цвета
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
